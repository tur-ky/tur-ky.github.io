<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=900">
    <title>TERMINAL // 3D KINETIC SIMULATION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --term-bg: #050505;
            --term-green: #0f0;
            --term-green-dim: rgba(0, 255, 0, 0.3);
            --term-red: #f00;
            --term-red-dim: rgba(255, 0, 0, 0.3);
            --term-white: #e3e3e3;
            --font-main: 'Courier Prime', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 5px var(--term-green);
        }

        /* 3D Canvas Background */
        #sim-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* CRT Overlay */
        #crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 20;
            pointer-events: none; /* Let clicks pass through to canvas by default */
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto; /* Re-enable clicks for inputs */
        }

        .hud-box {
            background: rgba(5, 5, 5, 0.85);
            border: 1px solid var(--term-green);
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        h1 { font-size: 1.2rem; margin-bottom: 15px; color: var(--term-white); }
        
        .return-link {
            color: var(--term-red);
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        .return-link:hover { color: var(--term-white); }

        /* Inputs */
        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .input-row label { width: 80px; font-weight: bold; }
        
        .terminal-input {
            background: transparent;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            font-family: var(--font-main);
            padding: 5px;
            width: 80px;
            outline: none;
            text-shadow: inherit;
        }
        
        .terminal-input:focus { background: var(--term-green-dim); color: var(--term-white); }
        .terminal-input[readonly] { border-color: var(--term-green-dim); color: var(--term-white); }

        /* Weapon Select */
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            background: transparent;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            font-family: var(--font-main);
            font-weight: bold;
            padding: 5px 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            text-shadow: inherit;
        }
        .btn:hover, .btn.active {
            background: var(--term-green);
            color: var(--term-bg);
            box-shadow: 0 0 10px var(--term-green);
            text-shadow: none;
        }

        /* Stats HUD */
        .stats-panel {
            text-align: right;
        }
        .hud-stat { font-size: 1.2rem; margin-bottom: 5px; }
        .hud-stat span { color: var(--term-white); font-weight: bold; }

        /* Lock Screen Banner */
        #lock-banner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 5, 0.9);
            border: 2px solid var(--term-red);
            color: var(--term-red);
            padding: 20px 40px;
            text-align: center;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 10px rgba(255,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(255,0,0,0.6); } 100% { box-shadow: 0 0 10px rgba(255,0,0,0.2); } }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 0, 0.8);
        }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }
    </style>
</head>
<body>

    <div id="sim-container"></div>
    <div id="crt-overlay"></div>
    
    <div id="crosshair"></div>

    <div id="ui-layer">
        <div class="header-panel">
            
            <!-- Left HUD: Config -->
            <div class="hud-box">
                <a href="index.html" class="return-link">< RETURN TO DOSSIER</a>
                <h1>KINETIC TELEMETRY // CS2 ENGINE</h1>
                
                <div class="input-row">
                    <label>SENSITIVITY</label>
                    <input type="number" id="inp-sens" class="terminal-input" value="1.00" step="0.05">
                </div>
                <div class="input-row">
                    <label>MOUSE DPI</label>
                    <input type="number" id="inp-dpi" class="terminal-input" value="800" step="50">
                </div>
                <div class="input-row">
                    <label>CM/360</label>
                    <input type="text" id="inp-cm" class="terminal-input" readonly>
                </div>

                <div class="controls">
                    <button class="btn active" data-weapon="ak47">AK-47</button>
                    <button class="btn" data-weapon="m4a4">M4A4</button>
                    <button class="btn" data-weapon="m4a1s">M4A1-S</button>
                </div>
            </div>

            <!-- Right HUD: Status -->
            <div class="hud-box stats-panel">
                <div class="hud-stat">WEAPON: <span id="hud-weapon">AK-47</span></div>
                <div class="hud-stat">ROUNDS: <span id="hud-ammo">30</span></div>
            </div>
            
        </div>
    </div>

    <div id="lock-banner">> CLICK HERE TO INITIALIZE UPLINK AND LOCK MOUSE <br><small style="font-size:1rem; color:var(--term-white)">(ESC TO DISENGAGE)</small></div>

    <script>
        // --- WEAPON DATA (3D ANGULAR CONVERSION) ---
        // We use the same baseline pattern shape, but scale the pixel offsets into radians.
        // CS2 recoil forces the pitch up (positive recoil target) and yaw left/right.
        const RAD_SCALE = 0.0012; // Tuning factor for angular kick
        
        const weapons = {
            ak47: {
                name: "AK-47", rpm: 600, mag: 30,
                pattern: [
                    {x: 0, y: 0}, {x: 2, y: 25}, {x: -5, y: 50}, {x: -10, y: 75}, {x: -15, y: 100}, 
                    {x: -20, y: 125}, {x: -28, y: 140}, {x: -35, y: 150}, {x: -40, y: 160}, {x: -40, y: 165},
                    {x: -30, y: 170}, {x: -15, y: 175}, {x: 5, y: 175}, {x: 25, y: 170}, {x: 45, y: 165},
                    {x: 60, y: 160}, {x: 75, y: 155}, {x: 80, y: 150}, {x: 75, y: 145}, {x: 60, y: 145},
                    {x: 40, y: 150}, {x: 20, y: 155}, {x: 0, y: 160}, {x: -20, y: 165}, {x: -40, y: 165},
                    {x: -60, y: 160}, {x: -75, y: 155}, {x: -85, y: 150}, {x: -90, y: 145}, {x: -95, y: 140}
                ].map(p => ({ x: p.x * RAD_SCALE, y: p.y * RAD_SCALE }))
            },
            m4a4: {
                name: "M4A4", rpm: 666, mag: 30,
                pattern: [
                    {x: 0, y: 0}, {x: 0, y: 20}, {x: -2, y: 40}, {x: -5, y: 60}, {x: -10, y: 75},
                    {x: -15, y: 90}, {x: -22, y: 105}, {x: -30, y: 115}, {x: -35, y: 125}, {x: -40, y: 130},
                    {x: -35, y: 135}, {x: -25, y: 140}, {x: -10, y: 140}, {x: 5, y: 140}, {x: 20, y: 135},
                    {x: 35, y: 130}, {x: 45, y: 125}, {x: 50, y: 120}, {x: 45, y: 115}, {x: 35, y: 115},
                    {x: 20, y: 120}, {x: 5, y: 125}, {x: -10, y: 130}, {x: -25, y: 130}, {x: -40, y: 125},
                    {x: -55, y: 120}, {x: -65, y: 115}, {x: -70, y: 110}, {x: -75, y: 105}, {x: -80, y: 100}
                ].map(p => ({ x: p.x * RAD_SCALE, y: p.y * RAD_SCALE }))
            },
            m4a1s: {
                name: "M4A1-S", rpm: 600, mag: 20,
                pattern: [
                    {x: 0, y: 0}, {x: 0, y: 15}, {x: -2, y: 30}, {x: -4, y: 45}, {x: -8, y: 60},
                    {x: -12, y: 70}, {x: -18, y: 80}, {x: -22, y: 85}, {x: -25, y: 90}, {x: -22, y: 95},
                    {x: -15, y: 95}, {x: -5, y: 95}, {x: 5, y: 95}, {x: 15, y: 95}, {x: 25, y: 90},
                    {x: 30, y: 85}, {x: 32, y: 80}, {x: 28, y: 80}, {x: 20, y: 85}, {x: 10, y: 85}
                ].map(p => ({ x: p.x * RAD_SCALE, y: p.y * RAD_SCALE }))
            }
        };

        // --- GLOBAL STATE ---
        let currentWeapon = 'ak47';
        let isShooting = false;
        let bulletIndex = 0;
        let simInterval = null;
        let isLocked = false;
        
        // Sensitivity Math
        let sens = 1.0;
        let dpi = 800;
        const M_YAW = 0.022; // Source Engine Default

        // Camera Angles
        let basePitch = 0;
        let baseYaw = 0;
        let recoilPitch = 0;
        let recoilYaw = 0;
        let targetRecoilPitch = 0;
        let targetRecoilYaw = 0;

        let impacts = []; // Array to store hit decals

        // --- DOM REFS ---
        const inpSens = document.getElementById('inp-sens');
        const inpDpi = document.getElementById('inp-dpi');
        const inpCm = document.getElementById('inp-cm');
        const hudAmmo = document.getElementById('hud-ammo');
        const hudWeapon = document.getElementById('hud-weapon');
        const lockBanner = document.getElementById('lock-banner');
        const btns = document.querySelectorAll('.btn');
        const container = document.getElementById('sim-container');

        // --- CM/360 CONVERTER ---
        function updateSensMath() {
            sens = parseFloat(inpSens.value) || 1.0;
            dpi = parseInt(inpDpi.value) || 800;
            // Formula: cm/360 = (360 / (yaw * sens * dpi)) * 2.54
            const cm360 = (360 / (M_YAW * sens * dpi)) * 2.54;
            inpCm.value = cm360.toFixed(2) + " cm";
        }
        
        inpSens.addEventListener('input', updateSensMath);
        inpDpi.addEventListener('input', updateSensMath);
        updateSensMath();

        // --- THREE.JS INITIALIZATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.02);

        // Camera (FOV 90 to match CS2 rough feel)
        const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // ~Eye level

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Build Environment (Grid room)
        const gridHelper = new THREE.GridHelper(50, 50, 0x00ff00, 0x003300);
        scene.add(gridHelper);

        // Target Wall
        const wallGeo = new THREE.PlaneGeometry(50, 20);
        const wallMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 5, -10);
        scene.add(wall);

        // Target Outline (The box you aim at)
        const edges = new THREE.EdgesGeometry(new THREE.PlaneGeometry(4, 4));
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ff00 }));
        line.position.set(0, 1.6, -9.9);
        scene.add(line);

        // Decal Geometry for bullets
        const decalGeo = new THREE.PlaneGeometry(0.1, 0.1);
        const decalMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        // Raycaster for hit registration
        const raycaster = new THREE.Raycaster();
        const centerPoint = new THREE.Vector2(0, 0); // Screen center

        // --- CORE KINETIC LOGIC ---
        function clearImpacts() {
            impacts.forEach(mesh => scene.remove(mesh));
            impacts = [];
        }

        function switchWeapon(key) {
            currentWeapon = key;
            const w = weapons[key];
            hudWeapon.textContent = w.name;
            hudAmmo.textContent = w.mag;
            btns.forEach(b => b.classList.toggle('active', b.dataset.weapon === key));
            clearImpacts();
        }

        function fireBullet() {
            const w = weapons[currentWeapon];
            if (bulletIndex >= w.mag) {
                stopShooting();
                return;
            }

            // Set Target Recoil Angles
            const recoil = w.pattern[bulletIndex];
            targetRecoilPitch = recoil.y;
            targetRecoilYaw = recoil.x;

            // Hit Registration via Raycast
            raycaster.setFromCamera(centerPoint, camera);
            const intersects = raycaster.intersectObject(wall);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                const decal = new THREE.Mesh(decalGeo, decalMat);
                decal.position.copy(hit.point);
                // Push slightly off wall to prevent z-fighting
                decal.position.z += 0.01;
                scene.add(decal);
                impacts.push(decal);
            }

            bulletIndex++;
            hudAmmo.textContent = w.mag - bulletIndex;
        }

        function startShooting() {
            if (!isLocked) return;
            isShooting = true;
            clearImpacts();
            bulletIndex = 0;
            const w = weapons[currentWeapon];
            
            fireBullet(); // First shot instant
            simInterval = setInterval(fireBullet, 60000 / w.rpm);
        }

        function stopShooting() {
            isShooting = false;
            clearInterval(simInterval);
            // Initiate recoil decay
            targetRecoilPitch = 0;
            targetRecoilYaw = 0;
        }

        // --- POINTER LOCK & RAW MOUSE INPUT ---
        lockBanner.addEventListener('click', async () => {
            try {
                // Targeting the canvas element directly is safer for WebGL
                const lockPromise = renderer.domElement.requestPointerLock();
                if (lockPromise) {
                    await lockPromise;
                }
            } catch (err) {
                lockBanner.innerHTML = "> ERR: SANDBOX BLOCKED POINTER LOCK.<br><small style='font-size:1rem; color:var(--term-white)'>(OPEN SPRAY.HTML DIRECTLY IN A NEW TAB)</small>";
                lockBanner.style.borderColor = "#ff0000";
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = (document.pointerLockElement === renderer.domElement || document.pointerLockElement === document.body);
            
            if (isLocked) {
                lockBanner.style.display = 'none';
            } else {
                lockBanner.style.display = 'block';
                // Reset banner text in case they exit normally
                lockBanner.innerHTML = "> CLICK HERE TO INITIALIZE UPLINK AND LOCK MOUSE <br><small style='font-size:1rem; color:var(--term-white)'>(ESC TO DISENGAGE)</small>";
                lockBanner.style.borderColor = "var(--term-red)";
                stopShooting();
            }
        });

        document.addEventListener('pointerlockerror', () => {
            // Catches legacy synchronous failures
            lockBanner.innerHTML = "> ERR: SANDBOX BLOCKED POINTER LOCK.<br><small style='font-size:1rem; color:var(--term-white)'>(OPEN SPRAY.HTML DIRECTLY IN A NEW TAB)</small>";
            lockBanner.style.borderColor = "#ff0000";
        });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;

            // CS2 Engine Math Implementation
            // deltaDegrees = rawMouseDelta * sens * m_yaw
            // radians = deltaDegrees * (PI / 180)
            const radPerDot = sens * M_YAW * (Math.PI / 180);
            
            const yawDelta = e.movementX * radPerDot;
            const pitchDelta = e.movementY * radPerDot;

            // Apply to base camera angles. 
            // Negative yaw = left, positive = right. Negative pitch = up, positive = down.
            baseYaw -= yawDelta;
            basePitch -= pitchDelta;

            // Clamp pitch to look straight up/down max
            basePitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, basePitch));
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button === 0 && isLocked) startShooting();
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 0 && isShooting) stopShooting();
        });

        btns.forEach(btn => {
            btn.addEventListener('click', (e) => switchWeapon(e.target.dataset.weapon));
        });

        // --- RENDER LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Smoothly interpolate current recoil towards target recoil
            // Decay is faster when not shooting
            const smoothFactor = isShooting ? 15.0 : 8.0; 
            recoilPitch += (targetRecoilPitch - recoilPitch) * smoothFactor * delta;
            recoilYaw += (targetRecoilYaw - recoilYaw) * smoothFactor * delta;

            // Composite camera rotation: Base Mouse Angles + Recoil Angles
            // Euler rotation order 'YXZ' prevents camera roll
            camera.rotation.set(basePitch + recoilPitch, baseYaw + recoilYaw, 0, 'YXZ');

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
